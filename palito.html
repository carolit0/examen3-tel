<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen 3 - Telemática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            z-index: 10;
        }
        h1 {
            font-size: 2.5rem;
            color: #ff6b81;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 107, 129, 0.5);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #d1d1e9;
            margin-bottom: 15px;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #a2a2d0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }
        /* Estilos para los corazones flotantes */
        .heart {
            position: absolute;
            color: #ff6b81;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            opacity: 0.8;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola, Profe! 👋</h1>
        <p>Se extraña un montón la clase de Telemática y los laboratorios en vivo.</p>
        <p>Este es mi servicio web completamente propio, desplegado de manera persistente sobre un contenedor Docker autónomo en AWS.</p>
        <div class="footer">
            <p><strong>Estudiante:</strong> Carolina</p>
            <p>Examen 3 • Servidores de Producción</p>
        </div>
    </div>

    <script>
        // Función para crear un corazoncito flotante
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // Posición horizontal aleatoria
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Tamaño aleatorio para dar profundidad
            const size = Math.random() * 1.5 + 0.5;
            heart.style.transform = `scale(${size})`;
            
            // Velocidad de subida aleatoria
            const duration = Math.random() * 3 + 2;
            heart.style.animationDuration = duration + 's';
            
            document.body.appendChild(heart);
            
            // Eliminar el corazón cuando termine la animación
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Generar corazones automáticamente de forma continua
        setInterval(createHeart, 300);
        document.addEventListener('click', (e) => {
                createHeart();
            }
        });
</body>
