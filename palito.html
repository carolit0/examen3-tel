<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen 3 - Telemática</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fondo completamente rosado pastel */
            background: #ffb6c1; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .card {
            background: rgba(255, 255, 255, 0.85); /* Tarjeta blanca semitransparente */
            border: 2px solid #ff69b4;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            z-index: 10;
        }
        h1 {
            font-size: 2.3rem;
            color: #ff1493; /* Rosado oscuro para el título */
            margin-bottom: 20px;
        }
        p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #333333;
            margin-bottom: 15px;
        }
        .footer {
            margin-top: 25px;
            font-size: 1rem;
            color: #ff1493;
            border-top: 2px dashed #ffb6c1;
            padding-top: 15px;
        }

        /* --- CORAZONES CSS PURO (Para garantizar que floten siempre) --- */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff1493;
            transform: rotate(-45deg);
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            opacity: 0.8;
        }
        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff1493;
            border-radius: 50%;
        }
        .heart::before {
            top: -10px;
            left: 0;
        }
        .heart::after {
            top: 0;
            left: 10px;
        }

        @keyframes floatUp {
            0% {
                bottom: -50px;
                transform: rotate(-45deg) scale(0);
                opacity: 1;
            }
            100% {
                bottom: 105vh;
                transform: rotate(-45deg) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola profee! 👋</h1>
        <p>se extraña la clase la verdad :((.</p>
        <p>Aprendi mucho, gracias por todo &lt;3</p>
        <div class="footer">
            <p><strong>Estudiante:</strong> Carolina</p>
            <p>Examen 3 • Telemática</p>
        </div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Ubicación horizontal aleatoria
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Velocidad aleatoria
            const duration = Math.random() * 3 + 2.5;
            heart.style.animationDuration = duration + 's';
            
            document.body.appendChild(heart);
            
            // Borrar cuando termine la animación
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Lluvia constante de corazones cada 250ms
        setInterval(createHeart, 250);

        // Corazones extra al hacer clic
        document.addEventListener('click', () => {
            for(let i=0; i<6; i++) { createHeart(); }
        });
    </script>
</body>
</html>
